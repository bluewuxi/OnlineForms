  OnlineFormsObservabilityDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AWS::StackName}-overview"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Requests and Errors",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiId", "${OnlineFormsHttpApi}", "Stage", "v1", { "stat": "Sum" } ],
                  [ ".", "4xx", ".", ".", ".", ".", { "stat": "Sum" } ],
                  [ ".", "5xx", ".", ".", ".", ".", { "stat": "Sum" } ]
                ],
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Errors and Duration",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "${PublicEnrollmentsCreateFunction}", { "stat": "Sum" } ],
                  [ ".", "Duration", ".", ".", { "stat": "p95", "yAxis": "right" } ]
                ],
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "DynamoDB Throttled Requests",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/DynamoDB", "ThrottledRequests", "TableName", "${OnlineFormsMainTable}", { "stat": "Sum" } ]
                ],
                "period": 300
              }
            }
          ]
        }

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API 5xx spike for OnlineForms
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: ApiId
          Value: !Ref OnlineFormsHttpApi
        - Name: Stage
          Value: v1

  PublicEnrollmentsLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Public enrollment lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FunctionName
          Value: !Ref PublicEnrollmentsCreateFunction

  DynamoDbThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: DynamoDB throttled requests detected
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TableName
          Value: !Ref OnlineFormsMainTable

  AuthInvalidTokenAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Invalid auth token spike detected
      Namespace: OnlineForms/Auth
      MetricName: InvalidTokenCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: Service
          Value: onlineforms-api

  AuthTenantMismatchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Tenant mismatch authorization denials detected
      Namespace: OnlineForms/Auth
      MetricName: TenantMismatchCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: Service
          Value: onlineforms-api

  AuthRoleDeniedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Role denied authorization denials detected
      Namespace: OnlineForms/Auth
      MetricName: RoleDeniedCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: Service
          Value: onlineforms-api

Outputs:
  ApiBaseUrl:
    Description: HTTP API endpoint
    Value: !Sub "https://${OnlineFormsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
  ApiCustomDomainUrl:
    Condition: UseApiCustomDomain
    Description: Custom API domain URL
    Value: !Sub "https://${ApiCustomDomainName}/v1"
  CognitoUserPoolId:
    Condition: UseManagedCognito
    Description: Cognito User Pool Id
    Value: !Ref OnlineFormsUserPool
  CognitoUserPoolClientId:
    Condition: UseManagedCognito
    Description: Cognito User Pool App Client Id
    Value: !Ref OnlineFormsUserPoolClient
  CognitoHostedUiDomain:
    Condition: UseManagedCognito
    Description: Cognito Hosted UI domain
    Value: !Ref OnlineFormsUserPoolDomain
  CognitoHostedUiDomainUrl:
    Condition: UseManagedCognito
    Description: Cognito Hosted UI base URL
    Value: !Sub "https://${OnlineFormsUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
  CognitoInternalGroupName:
    Condition: UseManagedCognito
    Description: Internal portal Cognito group name
    Value: !Ref CognitoInternalGroupName
