<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">OnlineForms organization portal mockup</title>
  <desc id="desc">Low fidelity visual mockup for the organization course workspace.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f6f4"/>
      <stop offset="100%" stop-color="#ecefe9"/>
    </linearGradient>
    <style>
      .sans { font-family: Arial, Helvetica, sans-serif; }
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .muted { fill: #6b766f; }
      .tiny { font-size: 13px; letter-spacing: 1.8px; text-transform: uppercase; }
      .small { font-size: 16px; }
    </style>
  </defs>

  <rect width="1440" height="1024" fill="url(#shell)"/>
  <rect x="32" y="28" width="1376" height="968" rx="24" fill="#fbfcfa"/>

  <rect x="32" y="28" width="1376" height="78" rx="24" fill="#14313d"/>
  <text x="78" y="74" class="sans" font-size="28" fill="#f8fbfb">OnlineForms</text>
  <text x="290" y="74" class="sans small" fill="#c8d8de">Dashboard</text>
  <text x="408" y="74" class="sans small" fill="#ffffff">Courses</text>
  <text x="500" y="74" class="sans small" fill="#c8d8de">Submissions</text>
  <text x="630" y="74" class="sans small" fill="#c8d8de">Settings</text>
  <rect x="1218" y="48" width="146" height="38" rx="19" fill="#d7aa61"/>
  <text x="1262" y="72" class="sans small" fill="#112127">New course</text>

  <rect x="64" y="136" width="356" height="824" rx="20" fill="#f2f4ef"/>
  <text x="94" y="188" class="sans tiny muted">Courses</text>
  <text x="94" y="234" class="serif" font-size="44" fill="#18252b">Spring intake</text>

  <rect x="94" y="270" width="296" height="44" rx="22" fill="#ffffff"/>
  <text x="122" y="298" class="sans small" fill="#8a938e">Search courses</text>

  <rect x="94" y="340" width="296" height="118" rx="18" fill="#ffffff"/>
  <text x="120" y="374" class="sans tiny" fill="#7c6a47">Published</text>
  <text x="120" y="414" class="sans" font-size="28" fill="#18252b">Intro to AI</text>
  <text x="120" y="444" class="sans small muted">Form complete • Enrolment open</text>

  <rect x="94" y="474" width="296" height="118" rx="18" fill="#e8ede6" stroke="#ccd4ca"/>
  <text x="120" y="508" class="sans tiny" fill="#6d7772">Draft</text>
  <text x="120" y="548" class="sans" font-size="28" fill="#18252b">Digital Writing</text>
  <text x="120" y="578" class="sans small muted">Needs form fields and preview</text>

  <rect x="94" y="608" width="296" height="118" rx="18" fill="#f6f7f4"/>
  <text x="120" y="642" class="sans tiny" fill="#7c6a47">Archived</text>
  <text x="120" y="682" class="sans" font-size="28" fill="#18252b">Photography Basics</text>
  <text x="120" y="712" class="sans small muted">Closed last term</text>

  <text x="474" y="188" class="sans tiny muted">Course workspace</text>
  <text x="474" y="238" class="serif" font-size="52" fill="#18252b">Intro to AI</text>
  <text x="474" y="274" class="sans small muted">A course-first editor with the form builder inside the workflow, not as separate navigation.</text>

  <rect x="474" y="316" width="822" height="54" rx="27" fill="#eef2ed"/>
  <circle cx="526" cy="343" r="16" fill="#14313d"/>
  <circle cx="726" cy="343" r="16" fill="#d8b074"/>
  <circle cx="926" cy="343" r="16" fill="#d6ddd7"/>
  <circle cx="1126" cy="343" r="16" fill="#d6ddd7"/>
  <text x="554" y="349" class="sans small" fill="#18252b">Details</text>
  <text x="754" y="349" class="sans small" fill="#18252b">Form</text>
  <text x="954" y="349" class="sans small" fill="#5d6761">Preview</text>
  <text x="1154" y="349" class="sans small" fill="#5d6761">Publish</text>

  <rect x="474" y="404" width="528" height="514" rx="24" fill="#ffffff"/>
  <text x="512" y="452" class="sans tiny muted">Current tab</text>
  <text x="512" y="500" class="sans" font-size="30" fill="#18252b">Form builder</text>
  <text x="512" y="534" class="sans small muted">Field list stays plain and readable. Preview is a parallel panel, not a separate page.</text>

  <line x1="512" y1="576" x2="964" y2="576" stroke="#d8ddd8"/>
  <text x="512" y="620" class="sans small" fill="#18252b">Full name</text>
  <text x="878" y="620" class="sans small muted">Required</text>
  <line x1="512" y1="644" x2="964" y2="644" stroke="#edf0ec"/>
  <text x="512" y="690" class="sans small" fill="#18252b">Email</text>
  <text x="898" y="690" class="sans small muted">Required</text>
  <line x1="512" y1="714" x2="964" y2="714" stroke="#edf0ec"/>
  <text x="512" y="760" class="sans small" fill="#18252b">Learning goals</text>
  <text x="890" y="760" class="sans small muted">Optional</text>
  <line x1="512" y1="784" x2="964" y2="784" stroke="#edf0ec"/>
  <text x="512" y="830" class="sans small" fill="#18252b">Consent</text>
  <text x="902" y="830" class="sans small muted">Required</text>

  <rect x="1032" y="404" width="264" height="514" rx="24" fill="#f4f6f1"/>
  <text x="1062" y="452" class="sans tiny muted">Live preview</text>
  <rect x="1062" y="480" width="204" height="132" rx="18" fill="#153541"/>
  <text x="1088" y="530" class="sans tiny" fill="#d9e3e6">Course detail</text>
  <text x="1088" y="576" class="serif" font-size="26" fill="#ffffff">Join Intro to AI</text>
  <rect x="1088" y="646" width="152" height="14" rx="7" fill="#d5dad4"/>
  <rect x="1088" y="676" width="136" height="14" rx="7" fill="#d5dad4"/>
  <rect x="1088" y="726" width="116" height="38" rx="19" fill="#d7aa61"/>
  <text x="1118" y="750" class="sans small" fill="#18252b">Open form</text>

  <rect x="1048" y="844" width="232" height="48" rx="24" fill="#14313d"/>
  <text x="1100" y="874" class="sans small" fill="#ffffff">Save changes</text>
</svg>
