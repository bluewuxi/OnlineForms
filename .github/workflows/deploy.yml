name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'docs/**'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy SAM
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      STACK_NAME: ${{ vars.STACK_NAME }}
      DEPLOYMENT_ENVIRONMENT: ${{ vars.DEPLOYMENT_ENVIRONMENT }}
      COGNITO_TOKEN_USE: ${{ vars.COGNITO_TOKEN_USE }}
      COGNITO_HOSTED_UI_HOME_LOGOUT_URL: ${{ vars.COGNITO_HOSTED_UI_HOME_LOGOUT_URL }}
      API_CUSTOM_DOMAIN_ENABLED: ${{ vars.API_CUSTOM_DOMAIN_ENABLED }}
      API_CUSTOM_DOMAIN_NAME: ${{ vars.API_CUSTOM_DOMAIN_NAME }}
      API_CUSTOM_DOMAIN_CERTIFICATE_ARN: ${{ vars.API_CUSTOM_DOMAIN_CERTIFICATE_ARN }}
      API_CUSTOM_DOMAIN_HOSTED_ZONE_ID: ${{ vars.API_CUSTOM_DOMAIN_HOSTED_ZONE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package Lambda zip
        run: |
          rm -rf deploy
          mkdir -p deploy/package
          cp -r dist deploy/package/dist
          cp package.json package-lock.json deploy/package/
          npm ci --omit=dev --prefix deploy/package
          (cd deploy/package && zip -rq ../lambda.zip .)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-onlineforms-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Normalize deployment environment
        run: |
          if [ -z "$DEPLOYMENT_ENVIRONMENT" ] || [ "$DEPLOYMENT_ENVIRONMENT" = "true" ]; then
            echo "DEPLOYMENT_ENVIRONMENT=stage" >> "$GITHUB_ENV"
            echo "Normalized DEPLOYMENT_ENVIRONMENT to stage."
          fi
          if [ -z "$COGNITO_TOKEN_USE" ]; then
            echo "COGNITO_TOKEN_USE=access" >> "$GITHUB_ENV"
            echo "Normalized COGNITO_TOKEN_USE to access."
          fi
          if [ -z "$COGNITO_HOSTED_UI_HOME_LOGOUT_URL" ]; then
            echo "COGNITO_HOSTED_UI_HOME_LOGOUT_URL=https://form.kidrawer.com/" >> "$GITHUB_ENV"
            echo "Normalized COGNITO_HOSTED_UI_HOME_LOGOUT_URL to https://form.kidrawer.com/."
          fi

      - name: Validate deployment environment
        run: |
          if [ -z "$AWS_REGION" ] || [ -z "$STACK_NAME" ]; then
            echo "AWS_REGION and STACK_NAME are required deployment variables."
            exit 1
          fi
          case "$DEPLOYMENT_ENVIRONMENT" in
            local|test|stage|prod) ;;
            *)
              echo "Invalid DEPLOYMENT_ENVIRONMENT: '$DEPLOYMENT_ENVIRONMENT'. Expected one of local/test/stage/prod."
              exit 1
              ;;
          esac
          case "$COGNITO_TOKEN_USE" in
            access|id) ;;
            *)
              echo "Invalid COGNITO_TOKEN_USE: '$COGNITO_TOKEN_USE'. Expected access or id."
              exit 1
              ;;
          esac
          if [ "$API_CUSTOM_DOMAIN_ENABLED" = "true" ]; then
            if [ -z "$API_CUSTOM_DOMAIN_NAME" ] || [ -z "$API_CUSTOM_DOMAIN_CERTIFICATE_ARN" ] || [ -z "$API_CUSTOM_DOMAIN_HOSTED_ZONE_ID" ]; then
              echo "Custom domain is enabled; API_CUSTOM_DOMAIN_NAME, API_CUSTOM_DOMAIN_CERTIFICATE_ARN, and API_CUSTOM_DOMAIN_HOSTED_ZONE_ID are required."
              exit 1
            fi
          fi

      - name: SAM deploy
        run: >-
          sam deploy
          -t infra/template.yaml
          --stack-name $STACK_NAME
          --region $AWS_REGION
          --capabilities CAPABILITY_IAM
          --parameter-overrides
          DeploymentEnvironment=$DEPLOYMENT_ENVIRONMENT
          ManagedCognitoEnabled=true
          CognitoTokenUse=$COGNITO_TOKEN_USE
          CognitoHostedUiHomeLogoutUrl=$COGNITO_HOSTED_UI_HOME_LOGOUT_URL
          ApiCustomDomainEnabled=$API_CUSTOM_DOMAIN_ENABLED
          ApiCustomDomainName=$API_CUSTOM_DOMAIN_NAME
          ApiCustomDomainCertificateArn=$API_CUSTOM_DOMAIN_CERTIFICATE_ARN
          ApiCustomDomainHostedZoneId=$API_CUSTOM_DOMAIN_HOSTED_ZONE_ID
          --resolve-s3
          --no-confirm-changeset
          --no-fail-on-empty-changeset

      - name: CloudFormation diagnostics (on failure)
        if: failure()
        run: |
          echo "Collecting CloudFormation diagnostics for stack: $STACK_NAME"
          LATEST_CHANGESET_ARN=$(aws cloudformation list-change-sets \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "sort_by(Summaries,&CreationTime)[-1].ChangeSetId" \
            --output text)

          if [ -n "$LATEST_CHANGESET_ARN" ] && [ "$LATEST_CHANGESET_ARN" != "None" ]; then
            echo "Latest change set ARN: $LATEST_CHANGESET_ARN"
            echo "=== describe-change-set (status/reason) ==="
            aws cloudformation describe-change-set \
              --change-set-name "$LATEST_CHANGESET_ARN" \
              --region "$AWS_REGION" \
              --query "{ChangeSetName:ChangeSetName,Status:Status,StatusReason:StatusReason,ExecutionStatus:ExecutionStatus}" \
              --output table || true

            echo "=== describe-change-set-hooks ==="
            aws cloudformation describe-change-set-hooks \
              --stack-name "$STACK_NAME" \
              --change-set-name "$LATEST_CHANGESET_ARN" \
              --region "$AWS_REGION" \
              --output json || true

            echo "=== list-hook-results ==="
            aws cloudformation list-hook-results \
              --target-type CHANGE_SET \
              --target-id "$LATEST_CHANGESET_ARN" \
              --region "$AWS_REGION" \
              --output json || true
          else
            echo "No change set found for stack $STACK_NAME."
          fi

          echo "=== recent stack events (latest 40) ==="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "StackEvents[0:40].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table || true
