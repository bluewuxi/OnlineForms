AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: OnlineForms API baseline (Phase 1 scaffold)

Parameters:
  DeploymentEnvironment:
    Type: String
    Default: local
    AllowedValues:
      - local
      - test
      - stage
      - prod
  ManagedCognitoEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  ExternalCognitoUserPoolId:
    Type: String
    Default: ""
  ExternalCognitoClientId:
    Type: String
    Default: ""
  CognitoTokenUse:
    Type: String
    Default: id
    AllowedValues:
      - access
      - id
  CognitoHostedUiDomainPrefix:
    Type: String
    Default: online-form-auth
    Description: Prefix for Cognito Hosted UI domain. Final domain appends account id.
    AllowedPattern: "^[a-z0-9-]+$"
  CognitoHostedUiCallbackUrl:
    Type: String
    Default: https://form.kidrawer.com/org/login
    Description: OAuth callback URL for Cognito Hosted UI.
  CognitoHostedUiLogoutUrl:
    Type: String
    Default: https://form.kidrawer.com/org/login
    Description: OAuth logout URL for Cognito Hosted UI.
  CognitoHostedUiHomeLogoutUrl:
    Type: String
    Default: https://form.kidrawer.com/
    Description: Additional logout URL for Cognito Hosted UI (public portal home).
  CognitoInternalGroupName:
    Type: String
    Default: internal_admin
    Description: Cognito group name used for internal portal capability.
    AllowedPattern: "^[A-Za-z0-9_\\-]+$"
  ManageInternalAdminGroupResource:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Whether CloudFormation should create/manage the internal admin Cognito group resource.
  ApiCustomDomainEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  ApiCustomDomainName:
    Type: String
    Default: form-api.kidrawer.com
  ApiCustomDomainCertificateArn:
    Type: String
    Default: ""
  ApiCustomDomainHostedZoneId:
    Type: String
    Default: ""

Mappings:
  AuthModeByEnvironment:
    local:
      Mode: mock
    test:
      Mode: mock
    stage:
      Mode: cognito
    prod:
      Mode: cognito

Conditions:
  UseManagedCognito: !Equals [!Ref ManagedCognitoEnabled, "true"]
  ManageInternalAdminGroup: !Equals [!Ref ManageInternalAdminGroupResource, "true"]
  CreateInternalAdminGroup: !And [!Condition UseManagedCognito, !Condition ManageInternalAdminGroup]
  HasApiCustomDomainCertificateArn: !Not [!Equals [!Ref ApiCustomDomainCertificateArn, ""]]
  HasApiCustomDomainHostedZoneId: !Not [!Equals [!Ref ApiCustomDomainHostedZoneId, ""]]
  UseApiCustomDomain: !And
    - !Equals [!Ref ApiCustomDomainEnabled, "true"]
    - !Condition HasApiCustomDomainCertificateArn
    - !Condition HasApiCustomDomainHostedZoneId

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        SERVICE_NAME: onlineforms-api
        APP_ENV: !Ref DeploymentEnvironment
        AUTH_MODE: !FindInMap [AuthModeByEnvironment, !Ref DeploymentEnvironment, Mode]
        COGNITO_USER_POOL_ID: !If [UseManagedCognito, !Ref OnlineFormsUserPool, !Ref ExternalCognitoUserPoolId]
        COGNITO_CLIENT_ID: !If [UseManagedCognito, !Ref OnlineFormsUserPoolClient, !Ref ExternalCognitoClientId]
        COGNITO_TOKEN_USE: !Ref CognitoTokenUse
        COGNITO_INTERNAL_GROUP_NAME: !Ref CognitoInternalGroupName
        ONLINEFORMS_TABLE: !Ref OnlineFormsMainTable
        ONLINEFORMS_AUTH_TABLE: !Ref OnlineFormsAuthTable
        ONLINEFORMS_INTERNAL_ACTIVITY_TABLE: !Ref OnlineFormsInternalActivityTable
        ONLINEFORMS_RATE_LIMIT_TABLE: !Ref OnlineFormsRateLimitTable
        ONLINEFORMS_ASSETS_BUCKET: !Ref OnlineFormsAssetsBucket

Resources:
  OnlineFormsHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: v1
      CorsConfiguration:
        AllowOrigins:
          - https://form.kidrawer.com
          - https://d1y9ka302ibufy.cloudfront.net
          - http://localhost:5173
        AllowHeaders:
          - content-type
          - idempotency-key
          - x-correlation-id
          - x-user-id
          - x-tenant-id
          - x-role
          - authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 600

  OnlineFormsApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: UseApiCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref ApiCustomDomainCertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  OnlineFormsApiCustomDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: UseApiCustomDomain
    Properties:
      ApiId: !Ref OnlineFormsHttpApi
      DomainName: !Ref OnlineFormsApiCustomDomain
      Stage: v1
      ApiMappingKey: v1

  OnlineFormsApiCustomDomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: UseApiCustomDomain
    Properties:
      HostedZoneId: !Ref ApiCustomDomainHostedZoneId
      Name: !Ref ApiCustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt OnlineFormsApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt OnlineFormsApiCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

  OnlineFormsMainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OnlineFormsMain
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OnlineFormsAuthTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OnlineFormsAuth
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OnlineFormsInternalActivityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OnlineFormsInternalActivity
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  OnlineFormsRateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OnlineFormsRateLimit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  OnlineFormsUserPool:
    Type: AWS::Cognito::UserPool
    Condition: UseManagedCognito
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Schema:
        - Name: defaultTenantId
          AttributeDataType: String
          Mutable: true
          StringAttributeConstraints:
            MinLength: "1"
            MaxLength: "128"
        - Name: platformRole
          AttributeDataType: String
          Mutable: true
          StringAttributeConstraints:
            MinLength: "1"
            MaxLength: "32"
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false

  OnlineFormsUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: UseManagedCognito
    Properties:
      UserPoolId: !Ref OnlineFormsUserPool
      ClientName: !Sub "${AWS::StackName}-app-client"
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - !Ref CognitoHostedUiCallbackUrl
      LogoutURLs:
        - !Ref CognitoHostedUiLogoutUrl
        - !Ref CognitoHostedUiHomeLogoutUrl

  OnlineFormsUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: UseManagedCognito
    Properties:
      UserPoolId: !Ref OnlineFormsUserPool
      Domain: !Sub "${CognitoHostedUiDomainPrefix}-${AWS::AccountId}"

  OnlineFormsOrgAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Condition: UseManagedCognito
    Properties:
      GroupName: org_admin
      UserPoolId: !Ref OnlineFormsUserPool

  OnlineFormsOrgEditorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Condition: UseManagedCognito
    Properties:
      GroupName: org_editor
      UserPoolId: !Ref OnlineFormsUserPool

  OnlineFormsPlatformAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Condition: UseManagedCognito
    Properties:
      GroupName: platform_admin
      UserPoolId: !Ref OnlineFormsUserPool

  OnlineFormsInternalAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Condition: CreateInternalAdminGroup
    Properties:
      GroupName: !Ref CognitoInternalGroupName
      UserPoolId: !Ref OnlineFormsUserPool

  OnlineFormsAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/health.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
        - DynamoDBReadPolicy:
            TableName: !Ref OnlineFormsAuthTable
      Events:
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /health
            Method: GET

