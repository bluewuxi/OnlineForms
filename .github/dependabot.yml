version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Pacific/Auckland"
    target-branch: master
    open-pull-requests-limit: 10
    groups:
      # Group all patch updates into a single PR to reduce noise
      patch-updates:
        update-types:
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
