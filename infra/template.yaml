AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: OnlineForms API baseline (Phase 1 scaffold)

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        SERVICE_NAME: onlineforms-api
        AUTH_MODE: cognito
        COGNITO_USER_POOL_ID: ""
        COGNITO_CLIENT_ID: ""
        COGNITO_TOKEN_USE: access

Resources:
  OnlineFormsHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: v1

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: dist/services/api/src/handlers/health.handler
      Events:
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /health
            Method: GET

  OrgMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: dist/services/api/src/handlers/orgMe.handler
      Events:
        OrgMeRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/me
            Method: GET

  OrgTenantCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: dist/services/api/src/handlers/orgTenantCheck.handler
      Events:
        OrgTenantCheckRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/tenants/{tenantId}/check
            Method: GET

Outputs:
  ApiBaseUrl:
    Description: HTTP API endpoint
    Value: !Sub "https://${OnlineFormsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
