info:
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  title: OnlineForms API
  description: OpenAPI contract for OnlineForms MVP v1.
  version: 1.0.0
security:
- bearerAuth: []
openapi: 3.1.0
tags:
- description: Organization course management endpoints
  name: Org Courses
- description: Organization form schema endpoints
  name: Org Forms
- description: Organization submission review endpoints
  name: Org Submissions
- description: Organization asset upload endpoints
  name: Org Assets
- description: Public tenant course catalog endpoints
  name: Public Catalog
- description: Public enrollment form endpoints
  name: Public Enrollment
- description: Internal platform tenant administration endpoints
  name: Platform Tenants
components:
  schemas:
    FormSchemaResponse:
      properties:
        data:
          $ref: '#/components/schemas/OrgFormSchema'
      type: object
      required:
      - data
    FormFieldType:
      enum:
      - short_text
      - long_text
      - email
      - phone
      - number
      - single_select
      - multi_select
      - checkbox
      - date
      type: string
    Course:
      properties:
        locationText:
          type:
          - string
          - "null"
        tenantId:
          type: string
        tenantCode:
          type: string
        paymentEnabledFlag:
          type: boolean
        fullDescription:
          maxLength: 10000
          type: string
        pricingMode:
          $ref: '#/components/schemas/PricingMode'
        publicVisible:
          type: boolean
        activeFormVersion:
          type:
          - integer
          - "null"
          minimum: 1
        endDate:
          format: date
          type: string
        enrollmentCloseAt:
          format: date-time
          type: string
        enrollmentOpenAt:
          format: date-time
          type: string
        title:
          maxLength: 120
          minLength: 1
          type: string
        brandingRef:
          type:
          - string
          - "null"
        activeFormId:
          type:
          - string
          - "null"
        capacity:
          type:
          - integer
          - "null"
          minimum: 1
        shortDescription:
          maxLength: 280
          type: string
        updatedBy:
          type:
          - string
          - "null"
        deliveryMode:
          $ref: '#/components/schemas/DeliveryMode'
        updatedAt:
          format: date-time
          type: string
        id:
          type: string
        status:
          $ref: '#/components/schemas/CourseStatus'
        imageAssetId:
          type:
          - string
          - "null"
        createdAt:
          format: date-time
          type: string
        startDate:
          format: date
          type: string
        createdBy:
          type:
          - string
          - "null"
      type: object
      required:
      - id
      - tenantId
      - title
      - status
      - publicVisible
      - pricingMode
      - createdAt
      - updatedAt
    OrgCourseWorkflow:
      properties:
        enrollmentStatus:
          enum:
          - upcoming
          - open
          - closed
          type: string
        hasActiveForm:
          type: boolean
        publishReady:
          type: boolean
      required:
      - enrollmentStatus
      - hasActiveForm
      - publishReady
      type: object
    OrgCourse:
      allOf:
      - $ref: '#/components/schemas/Course'
      - type: object
        properties:
          workflow:
            $ref: '#/components/schemas/OrgCourseWorkflow'
        required:
        - workflow
    PageMeta:
      properties:
        limit:
          type: integer
        nextCursor:
          type:
          - string
          - "null"
      type: object
      required:
      - limit
      - nextCursor
    EnrollmentCreateResponse:
      properties:
        data:
          properties:
            status:
              $ref: '#/components/schemas/SubmissionStatus'
            submittedAt:
              format: date-time
              type: string
            submissionId:
              type: string
            tenantCode:
              type: string
            courseId:
              type: string
            courseTitle:
              type: string
            links:
              type: object
              properties:
                tenantHome:
                  type: string
                course:
                  type: string
              required:
              - tenantHome
              - course
          type: object
          required:
          - submissionId
          - status
          - submittedAt
          - tenantCode
          - courseId
          - courseTitle
          - links
      type: object
      required:
      - data
    UploadTicket:
      properties:
        method:
          enum:
          - PUT
          type: string
        uploadUrl:
          format: uri
          type: string
        expiresAt:
          format: date-time
          type: string
        headers:
          additionalProperties:
            type: string
          type: object
        assetId:
          type: string
        publicUrl:
          format: uri
          type: string
      type: object
      required:
      - assetId
      - uploadUrl
      - method
      - headers
      - expiresAt
      - publicUrl
    CourseStatus:
      enum:
      - draft
      - published
      - archived
      type: string
    FormSchema:
      properties:
        courseId:
          type: string
        formId:
          type: string
        createdAt:
          format: date-time
          type: string
        version:
          type: integer
          minimum: 1
        updatedAt:
          format: date-time
          type: string
        tenantId:
          type: string
        fields:
          items:
            $ref: '#/components/schemas/FormField'
          type: array
        status:
          enum:
          - active
          type: string
      type: object
      required:
      - formId
      - tenantId
      - courseId
      - version
      - status
      - fields
    OrgFormSchemaSummary:
      properties:
        fieldCount:
          minimum: 0
          type: integer
        requiredFieldCount:
          minimum: 0
          type: integer
        fieldTypes:
          items:
            $ref: '#/components/schemas/FormFieldType'
          type: array
      required:
      - fieldCount
      - requiredFieldCount
      - fieldTypes
      type: object
    OrgFormSchema:
      allOf:
      - $ref: '#/components/schemas/FormSchema'
      - type: object
        properties:
          summary:
            $ref: '#/components/schemas/OrgFormSchemaSummary'
        required:
        - summary
    CreateEnrollmentRequest:
      properties:
        answers:
          additionalProperties: true
          type: object
        meta:
          properties:
            timezone:
              type:
              - string
              - "null"
            locale:
              type:
              - string
              - "null"
          type: object
        formVersion:
          type: integer
          minimum: 1
      type: object
      required:
      - formVersion
      - answers
    FormValidationRules:
      properties:
        pattern:
          type:
          - string
          - "null"
        min:
          type:
          - number
          - "null"
        max:
          type:
          - number
          - "null"
        minLength:
          type:
          - integer
          - "null"
          minimum: 0
        maxLength:
          type:
          - integer
          - "null"
          minimum: 0
      type: object
    PublicFormResponse:
      properties:
        data:
          properties:
            formId:
              type: string
            version:
              type: integer
              minimum: 1
            fields:
              items:
                $ref: '#/components/schemas/FormField'
              type: array
          type: object
          required:
          - formId
          - version
          - fields
      type: object
      required:
      - data
    SubmissionStatus:
      enum:
      - submitted
      - reviewed
      - canceled
      type: string
    TenantResponse:
      properties:
        data:
          $ref: '#/components/schemas/Tenant'
      type: object
      required:
      - data
    InternalTenantProfile:
      properties:
        tenantId:
          type: string
        tenantCode:
          type: string
        displayName:
          type: string
        description:
          type:
          - string
          - "null"
        isActive:
          type: boolean
        homePageContent:
          type:
          - string
          - "null"
        updatedAt:
          format: date-time
          type: string
      type: object
      required:
      - tenantId
      - tenantCode
      - displayName
      - isActive
      - updatedAt
    InternalTenantListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/InternalTenantProfile'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      type: object
      required:
      - data
      - page
    CreateInternalTenantRequest:
      properties:
        tenantCode:
          pattern: ^[a-z0-9-]{3,50}$
          type: string
        displayName:
          maxLength: 120
          minLength: 1
          type: string
        description:
          type:
          - string
          - "null"
        isActive:
          type: boolean
        homePageContent:
          type:
          - string
          - "null"
      type: object
      required:
      - tenantCode
      - displayName
    CreateTenantRequest:
      properties:
        status:
          enum:
          - active
          - suspended
          type: string
        tenantCode:
          pattern: ^[a-z0-9-]{3,50}$
          type: string
        displayName:
          maxLength: 120
          minLength: 1
          type: string
      type: object
      required:
      - tenantCode
      - displayName
    PublicCourseDetailResponse:
      properties:
        data:
          allOf:
          - $ref: '#/components/schemas/PublicCourse'
          - properties:
              fullDescription:
                type: string
              capacity:
                type:
                - integer
                - "null"
              formAvailable:
                type: boolean
            type: object
      type: object
      required:
      - data
    CourseDetailResponse:
      properties:
        data:
          $ref: '#/components/schemas/OrgCourse'
      type: object
      required:
      - data
    CourseListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/OrgCourse'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      type: object
      required:
      - data
      - page
    CreateUploadTicketRequest:
      properties:
        contentType:
          enum:
          - image/png
          - image/jpeg
          - image/webp
          type: string
        sizeBytes:
          maximum: 5242880
          type: integer
          minimum: 1
        purpose:
          enum:
          - course_image
          - org_logo
          type: string
        fileName:
          maxLength: 255
          minLength: 1
          type: string
      type: object
      required:
      - purpose
      - contentType
      - fileName
      - sizeBytes
    PublicCourseListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/PublicCourse'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      type: object
      required:
      - data
      - page
    PublicTenantDirectoryItem:
      properties:
        tenantId:
          type: string
        tenantCode:
          type: string
        displayName:
          type: string
        description:
          type:
          - string
          - "null"
        isActive:
          type: boolean
        branding:
          type: object
          properties:
            logoAssetId:
              type:
              - string
              - "null"
            logoUrl:
              format: uri
              type:
              - string
              - "null"
          required:
          - logoAssetId
          - logoUrl
        links:
          type: object
          properties:
            home:
              type: string
            courses:
              type: string
          required:
          - home
          - courses
      type: object
      required:
      - tenantId
      - tenantCode
      - displayName
      - isActive
      - branding
      - links
    PublicTenantDirectoryResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/PublicTenantDirectoryItem'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      type: object
      required:
      - data
      - page
    PublicTenantHome:
      properties:
        tenantCode:
          type: string
        displayName:
          type: string
        description:
          type:
          - string
          - "null"
        homePageContent:
          type:
          - string
          - "null"
        isActive:
          type: boolean
        branding:
          type: object
          properties:
            logoAssetId:
              type:
              - string
              - "null"
            logoUrl:
              format: uri
              type:
              - string
              - "null"
          required:
          - logoAssetId
          - logoUrl
        links:
          type: object
          properties:
            home:
              type: string
            publishedCourses:
              type: string
          required:
          - home
          - publishedCourses
      type: object
      required:
      - tenantCode
      - displayName
      - isActive
      - links
    PublicAuthRoleOption:
      properties:
        role:
          type: string
        label:
          type: string
        requiresTenant:
          type: boolean
      type: object
      required:
      - role
      - label
      - requiresTenant
    OrgMeResponse:
      properties:
        data:
          type: object
          properties:
            userId:
              type: string
            tenantId:
              type: string
            role:
              type: string
          required:
          - userId
          - tenantId
          - role
      type: object
      required:
      - data
    SessionContext:
      properties:
        tenantId:
          type: string
        status:
          enum:
          - active
          - invited
          - suspended
          type: string
        roles:
          items:
            type: string
          type: array
      type: object
      required:
      - tenantId
      - status
      - roles
    SessionContextsResponse:
      properties:
        data:
          type: object
          properties:
            userId:
              type: string
            tokenRole:
              type: string
            canAccessInternalPortal:
              type: boolean
            contexts:
              items:
                $ref: '#/components/schemas/SessionContext'
              type: array
          required:
          - userId
          - tokenRole
          - canAccessInternalPortal
          - contexts
      type: object
      required:
      - data
    SessionContextValidateRequest:
      properties:
        tenantId:
          type:
          - string
          - "null"
        role:
          type: string
      type: object
      required:
      - role
    SessionContextValidateResponse:
      properties:
        data:
          type: object
          properties:
            userId:
              type: string
            tenantId:
              type:
              - string
              - "null"
            role:
              type: string
          required:
          - userId
          - tenantId
          - role
      type: object
      required:
      - data
    AuditEvent:
      properties:
        id:
          type: string
        tenantId:
          type: string
        actorUserId:
          type: string
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        correlationId:
          type: string
        requestId:
          type: string
        details:
          additionalProperties: true
          type: object
        createdAt:
          format: date-time
          type: string
      type: object
      required:
      - id
      - tenantId
      - actorUserId
      - action
      - resourceType
      - resourceId
      - correlationId
      - requestId
      - details
      - createdAt
    AuditListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/AuditEvent'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      type: object
      required:
      - data
      - page
    TenantBrandingUpdateRequest:
      properties:
        logoAssetId:
          type:
          - string
          - "null"
      type: object
    TenantBrandingResponse:
      properties:
        data:
          type: object
          properties:
            tenantId:
              type: string
            logoAssetId:
              type:
              - string
              - "null"
            updatedAt:
              format: date-time
              type: string
          required:
          - tenantId
          - logoAssetId
          - updatedAt
      type: object
      required:
      - data
    CreateTenantInviteRequest:
      properties:
        email:
          type: string
        role:
          enum:
          - org_admin
          - org_editor
          type: string
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 30
      type: object
      required:
      - email
      - role
    TenantInvite:
      properties:
        inviteId:
          type: string
        tenantId:
          type: string
        email:
          type: string
        role:
          enum:
          - org_admin
          - org_editor
          type: string
        status:
          enum:
          - pending
          - accepted
          type: string
        expiresAt:
          format: date-time
          type: string
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
        createdBy:
          type: string
        updatedBy:
          type: string
        acceptedAt:
          format: date-time
          type:
          - string
          - "null"
        acceptedBy:
          type:
          - string
          - "null"
      type: object
      required:
      - inviteId
      - tenantId
      - email
      - role
      - status
      - expiresAt
      - createdAt
      - updatedAt
      - createdBy
      - updatedBy
      - acceptedAt
      - acceptedBy
    TenantInviteResponse:
      properties:
        data:
          $ref: '#/components/schemas/TenantInvite'
      type: object
      required:
      - data
    TenantInviteAcceptResponse:
      properties:
        data:
          type: object
          properties:
            tenantId:
              type: string
            userId:
              type: string
            role:
              enum:
              - org_admin
              - org_editor
              type: string
            activatedAt:
              format: date-time
              type: string
          required:
          - tenantId
          - userId
          - role
          - activatedAt
      type: object
      required:
      - data
    InternalAccessUser:
      properties:
        userId:
          type: string
        username:
          type: string
        email:
          type:
          - string
          - "null"
        enabled:
          type: boolean
        status:
          type: string
      type: object
      required:
      - userId
      - username
      - email
      - enabled
      - status
    InternalAccessUserPageResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/InternalAccessUser'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      type: object
      required:
      - data
      - page
    InternalAccessUserDetailResponse:
      properties:
        data:
          allOf:
          - $ref: '#/components/schemas/InternalAccessUser'
          - type: object
            properties:
              memberships:
                items:
                  $ref: '#/components/schemas/SessionContext'
                type: array
            required:
            - memberships
      type: object
      required:
      - data
    CreateInternalAccessUserRequest:
      properties:
        email:
          type: string
      type: object
      required:
      - email
    RemoveInternalAccessUserResponse:
      properties:
        data:
          type: object
          properties:
            userId:
              type: string
            removed:
              type: boolean
          required:
          - userId
          - removed
      type: object
      required:
      - data
    Tenant:
      properties:
        id:
          type: string
        createdAt:
          format: date-time
          type: string
        tenantCode:
          pattern: ^[a-z0-9-]{3,50}$
          type: string
        updatedAt:
          format: date-time
          type: string
        status:
          enum:
          - active
          - suspended
          type: string
        displayName:
          maxLength: 120
          minLength: 1
          type: string
      type: object
      required:
      - id
      - tenantCode
      - displayName
      - status
    FormOption:
      properties:
        label:
          maxLength: 120
          minLength: 1
          type: string
        value:
          maxLength: 120
          minLength: 1
          type: string
      type: object
      required:
      - label
      - value
    Submission:
      properties:
        tenantId:
          type: string
        tenantCode:
          type: string
        courseId:
          type: string
        answers:
          additionalProperties: true
          type: object
        reviewedBy:
          type:
          - string
          - "null"
        formVersion:
          type: integer
          minimum: 1
        formId:
          type: string
        applicant:
          additionalProperties: true
          type: object
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type:
          - string
          - "null"
        id:
          type: string
        submittedAt:
          format: date-time
          type: string
        reviewedAt:
          format: date-time
          type:
          - string
          - "null"
        status:
          $ref: '#/components/schemas/SubmissionStatus'
        applicantSummary:
          type: object
          properties:
            email:
              type:
              - string
              - "null"
            name:
              type:
              - string
              - "null"
        course:
          type: object
          properties:
            id:
              type: string
            title:
              type:
              - string
              - "null"
      type: object
      required:
      - id
      - tenantId
      - courseId
      - formId
      - formVersion
      - status
      - answers
      - submittedAt
    OrgSubmissionWorkflow:
      properties:
        canReview:
          type: boolean
        isTerminal:
          type: boolean
      required:
      - canReview
      - isTerminal
      type: object
    OrgSubmission:
      allOf:
      - $ref: '#/components/schemas/Submission'
      - type: object
        properties:
          course:
            type: object
            properties:
              id:
                type: string
              title:
                type:
                - string
                - "null"
            required:
            - id
            - title
          workflow:
            $ref: '#/components/schemas/OrgSubmissionWorkflow'
        required:
        - course
        - workflow
    FormField:
      properties:
        options:
          items:
            $ref: '#/components/schemas/FormOption'
          type: array
        type:
          $ref: '#/components/schemas/FormFieldType'
        displayOrder:
          type: integer
          minimum: 1
        label:
          maxLength: 120
          minLength: 1
          type: string
        helpText:
          maxLength: 280
          type:
          - string
          - "null"
        fieldId:
          pattern: ^[a-z][a-z0-9_]{1,63}$
          type: string
        validation:
          $ref: '#/components/schemas/FormValidationRules'
        required:
          type: boolean
      type: object
      required:
      - fieldId
      - type
      - label
      - required
      - displayOrder
    CreateCourseRequest:
      properties:
        locationText:
          type:
          - string
          - "null"
        pricingMode:
          $ref: '#/components/schemas/PricingMode'
        endDate:
          format: date
          type: string
        fullDescription:
          maxLength: 10000
          type: string
        enrollmentOpenAt:
          format: date-time
          type: string
        title:
          maxLength: 120
          minLength: 1
          type: string
        capacity:
          type:
          - integer
          - "null"
          minimum: 1
        shortDescription:
          maxLength: 280
          type: string
        deliveryMode:
          $ref: '#/components/schemas/DeliveryMode'
        enrollmentCloseAt:
          format: date-time
          type: string
        imageAssetId:
          type:
          - string
          - "null"
        startDate:
          format: date
          type: string
      type: object
      required:
      - title
      - shortDescription
      - fullDescription
      - startDate
      - endDate
      - enrollmentOpenAt
      - enrollmentCloseAt
      - deliveryMode
      - pricingMode
    UpdateSubmissionStatusRequest:
      properties:
        status:
          $ref: '#/components/schemas/SubmissionStatus'
      type: object
      required:
      - status
    ErrorObject:
      properties:
        message:
          type: string
        code:
          enum:
          - UNAUTHORIZED
          - FORBIDDEN
          - NOT_FOUND
          - CONFLICT
          - VALIDATION_ERROR
          - RATE_LIMITED
          - INTERNAL_ERROR
          type: string
        details:
          items:
            $ref: '#/components/schemas/ErrorDetail'
          type: array
      type: object
      required:
      - code
      - message
    SubmissionListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/OrgSubmission'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      type: object
      required:
      - data
      - page
    ErrorEnvelope:
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
        correlationId:
          type: string
        requestId:
          type: string
      type: object
      required:
      - error
      - requestId
      - correlationId
    ErrorDetail:
      properties:
        field:
          type:
          - string
