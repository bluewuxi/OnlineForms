AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: OnlineForms API baseline (Phase 1 scaffold)

Parameters:
  DeploymentEnvironment:
    Type: String
    Default: local
    AllowedValues:
      - local
      - test
      - stage
      - prod

Mappings:
  AuthModeByEnvironment:
    local:
      Mode: mock
    test:
      Mode: mock
    stage:
      Mode: cognito
    prod:
      Mode: cognito

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    Tracing: Active
    Policies:
      - DynamoDBReadPolicy:
          TableName: !Ref OnlineFormsAuthTable
    Environment:
      Variables:
        SERVICE_NAME: onlineforms-api
        APP_ENV: !Ref DeploymentEnvironment
        AUTH_MODE: !FindInMap [AuthModeByEnvironment, !Ref DeploymentEnvironment, Mode]
        COGNITO_USER_POOL_ID: ""
        COGNITO_CLIENT_ID: ""
        COGNITO_TOKEN_USE: access
        ONLINEFORMS_TABLE: !Ref OnlineFormsMainTable
        ONLINEFORMS_AUTH_TABLE: !Ref OnlineFormsAuthTable
        ONLINEFORMS_ASSETS_BUCKET: !Ref OnlineFormsAssetsBucket

Resources:
  OnlineFormsHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: v1
      CorsConfiguration:
        AllowOrigins:
          - https://d1y9ka302ibufy.cloudfront.net
          - http://localhost:5173
        AllowHeaders:
          - content-type
          - idempotency-key
          - x-correlation-id
          - x-user-id
          - x-tenant-id
          - x-role
          - authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - PUT
          - OPTIONS
        MaxAge: 600

  OnlineFormsMainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OnlineFormsMain
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OnlineFormsAuthTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OnlineFormsAuth
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OnlineFormsAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/health.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /health
            Method: GET

  OrgMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgMe.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgMeRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/me
            Method: GET

  OrgTenantCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgTenantCheck.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgTenantCheckRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/tenants/{tenantId}/check
            Method: GET

  OrgCoursesCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgCoursesCreate.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgCoursesCreateRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses
            Method: POST

  OrgCoursesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgCoursesList.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgCoursesListRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses
            Method: GET

  OrgCoursesGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgCoursesGet.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgCoursesGetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses/{courseId}
            Method: GET

  OrgCoursesUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgCoursesUpdate.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgCoursesUpdateRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses/{courseId}
            Method: PATCH

  OrgCoursesPublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgCoursesPublish.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgCoursesPublishRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses/{courseId}/publish
            Method: POST

  OrgCoursesArchiveFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgCoursesArchive.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgCoursesArchiveRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses/{courseId}/archive
            Method: POST

  OrgFormSchemaUpsertFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgFormSchemaUpsert.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgFormSchemaUpsertRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses/{courseId}/form-schema
            Method: PUT

  OrgFormSchemaGetLatestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgFormSchemaGetLatest.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgFormSchemaGetLatestRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses/{courseId}/form-schema
            Method: GET

  OrgFormSchemaGetVersionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgFormSchemaGetVersion.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgFormSchemaGetVersionRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/courses/{courseId}/form-schema/versions/{version}
            Method: GET

  OrgSubmissionsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgSubmissionsList.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgSubmissionsListRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/submissions
            Method: GET

  OrgSubmissionsGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgSubmissionsGet.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgSubmissionsGetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/submissions/{submissionId}
            Method: GET

  OrgSubmissionsUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgSubmissionsUpdate.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgSubmissionsUpdateRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/submissions/{submissionId}
            Method: PATCH

  OrgAssetsUploadTicketCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgAssetsUploadTicketCreate.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
        - S3WritePolicy:
            BucketName: !Ref OnlineFormsAssetsBucket
      Events:
        OrgAssetsUploadTicketCreateRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/assets/upload-ticket
            Method: POST

  OrgAssetsGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgAssetsGet.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgAssetsGetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/assets/{assetId}
            Method: GET

  OrgTenantBrandingUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgTenantBrandingUpdate.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgTenantBrandingUpdateRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/branding
            Method: PATCH

  OrgAuditListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/orgAuditList.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        OrgAuditListRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /org/audit
            Method: GET

  PaymentsStubFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/paymentsStub.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        PaymentsConfigRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /payments/config
            Method: GET
        PaymentsCheckoutRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /payments/checkout-session
            Method: POST
        PaymentsWebhookRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /payments/webhook
            Method: POST

  PublicCoursesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/publicCoursesList.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        PublicCoursesListRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /public/{tenantCode}/courses
            Method: GET

  PublicCoursesGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/publicCoursesGet.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        PublicCoursesGetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /public/{tenantCode}/courses/{courseId}
            Method: GET

  PublicEnrollmentsCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../deploy/lambda.zip
      Handler: dist/services/api/src/handlers/publicEnrollmentsCreate.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnlineFormsMainTable
      Events:
        PublicEnrollmentsCreateRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnlineFormsHttpApi
            Path: /public/{tenantCode}/courses/{courseId}/enrollments
            Method: POST

  OnlineFormsObservabilityDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AWS::StackName}-overview"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Requests and Errors",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiId", "${OnlineFormsHttpApi}", "Stage", "v1", { "stat": "Sum" } ],
                  [ ".", "4xx", ".", ".", ".", ".", { "stat": "Sum" } ],
                  [ ".", "5xx", ".", ".", ".", ".", { "stat": "Sum" } ]
                ],
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Errors and Duration",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "${PublicEnrollmentsCreateFunction}", { "stat": "Sum" } ],
                  [ ".", "Duration", ".", ".", { "stat": "p95", "yAxis": "right" } ]
                ],
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "DynamoDB Throttled Requests",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/DynamoDB", "ThrottledRequests", "TableName", "${OnlineFormsMainTable}", { "stat": "Sum" } ]
                ],
                "period": 300
              }
            }
          ]
        }

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API 5xx spike for OnlineForms
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: ApiId
          Value: !Ref OnlineFormsHttpApi
        - Name: Stage
          Value: v1

  PublicEnrollmentsLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Public enrollment lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FunctionName
          Value: !Ref PublicEnrollmentsCreateFunction

  DynamoDbThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: DynamoDB throttled requests detected
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TableName
          Value: !Ref OnlineFormsMainTable

Outputs:
  ApiBaseUrl:
    Description: HTTP API endpoint
    Value: !Sub "https://${OnlineFormsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
